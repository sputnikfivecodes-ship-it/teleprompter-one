<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teleprompter iPad 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* Tela de edição */
        #editorScreen {
            display: -webkit-box;
            display: flex;
            -webkit-box-align: center;
            align-items: center;
            -webkit-box-pack: center;
            justify-content: center;
            height: 100%;
            background: #0a0a0a;
            padding: 20px;
        }

        .card {
            background: #1c1c1e;
            border-radius: 28px;
            padding: 30px 25px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #2c2c2e;
        }

        h1 {
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #ff9a3c, #ff5e7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        textarea {
            width: 100%;
            background: #0c0c0d;
            border: 1px solid #3a3a3c;
            color: white;
            font-size: 16px;
            padding: 16px;
            border-radius: 20px;
            font-family: inherit;
            resize: vertical;
            height: 250px;
            -webkit-user-select: text;
            user-select: text;
        }

        .stats {
            display: -webkit-box;
            display: flex;
            -webkit-box-pack: justify;
            justify-content: space-between;
            margin: 15px 0 25px;
            background: #0c0c0d;
            padding: 12px 20px;
            border-radius: 40px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff9a3c;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
        }

        button {
            background: linear-gradient(135deg, #ff9a3c, #ff5e7c);
            border: none;
            color: white;
            font-weight: bold;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
        }

        button:active {
            transform: scale(0.97);
        }

        /* Tela do prompter */
        #prompterScreen {
            display: none;
            -webkit-box-orient: vertical;
            -webkit-box-direction: normal;
            flex-direction: column;
            height: 100%;
            background: black;
        }

        #scrollArea {
            -webkit-box-flex: 1;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        #prompterText {
            font-size: 56px;
            font-weight: 600;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: center;
        }

        /* Espelhamento com prefixo para iPad antigo */
        .mirror {
            -webkit-transform: scaleX(-1);
            transform: scaleX(-1);
        }

        .controlBar {
            background: rgba(0,0,0,0.9);
            border-top: 1px solid #333;
            padding: 16px 20px;
            display: -webkit-box;
            display: flex;
            -webkit-box-pack: center;
            justify-content: center;
            -webkit-box-align: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .ctrlBtn {
            background: #2c2c2e;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            width: auto;
            min-width: 80px;
        }

        .speedBox {
            background: #1c1c1e;
            border-radius: 40px;
            padding: 5px 15px;
            display: -webkit-box;
            display: flex;
            -webkit-box-align: center;
            align-items: center;
            gap: 15px;
        }

        .speedBtn {
            background: #ff9a3c;
            padding: 8px 16px;
            font-size: 20px;
            width: auto;
        }

        #speedValue {
            font-size: 1.4rem;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }

        .readingGuide {
            position: fixed;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 154, 60, 0.6);
            pointer-events: none;
            z-index: 10;
            -webkit-transform: translateY(-50%);
            transform: translateY(-50%);
        }

        @media (max-width: 600px) {
            #prompterText {
                font-size: 36px;
            }
            .ctrlBtn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<!-- TELA DE EDIÇÃO -->
<div id="editorScreen">
    <div class="card">
        <h1>FIVE CODES TP-ONE</h1>
        <textarea id="scriptInput" placeholder="Cole ou digite o texto do médico aqui..."></textarea>
        <div class="stats">
            <div class="stat"><div class="stat-value" id="charCount">0</div><div class="stat-label">caracteres</div></div>
            <div class="stat"><div class="stat-value" id="wordCount">0</div><div class="stat-label">palavras</div></div>
            <div class="stat"><div class="stat-value" id="timeEst">0 min</div><div class="stat-label">leitura</div></div>
        </div>
        <button id="startPrompterBtn">▶ INICIAR GRAVAÇÃO</button>
    </div>
</div>

<!-- TELA DO TELEPROMPTER -->
<div id="prompterScreen">
    <div id="scrollArea">
        <div id="prompterText"></div>
        <div class="readingGuide"></div>
    </div>
    <div class="controlBar">
        <button class="ctrlBtn" id="backEditBtn">✏️ EDITAR</button>
        <button class="ctrlBtn" id="playPauseBtn">⏸️ PAUSAR</button>
        <button class="ctrlBtn" id="topBtn">⬆️ TOPO</button>
        <div class="speedBox">
            <button class="speedBtn" id="speedDown">−</button>
            <span id="speedValue">10</span>
            <button class="speedBtn" id="speedUp">+</button>
        </div>
        <button class="ctrlBtn" id="mirrorToggleBtn">🪞 ESPELHO</button>
    </div>
</div>

<script>
    // ========== CÓDIGO COMPATÍVEL COM IPAD ANTIGO ==========
    
    var editorScreen = document.getElementById('editorScreen');
    var prompterScreen = document.getElementById('prompterScreen');
    var scriptInput = document.getElementById('scriptInput');
    var startBtn = document.getElementById('startPrompterBtn');
    var backEditBtn = document.getElementById('backEditBtn');
    var playPauseBtn = document.getElementById('playPauseBtn');
    var topBtn = document.getElementById('topBtn');
    var speedDown = document.getElementById('speedDown');
    var speedUp = document.getElementById('speedUp');
    var speedValueSpan = document.getElementById('speedValue');
    var mirrorToggleBtn = document.getElementById('mirrorToggleBtn');
    var prompterTextDiv = document.getElementById('prompterText');
    var scrollArea = document.getElementById('scrollArea');
    
    var charCountSpan = document.getElementById('charCount');
    var wordCountSpan = document.getElementById('wordCount');
    var timeEstSpan = document.getElementById('timeEst');
    
    var currentText = "";
    var scrollSpeed = 10;
    var isMirrored = false;
    var isScrolling = false;
    var scrollIntervalId = null;
    var lastTimestamp = 0;
    var pixelsPerSecond = 120;
    
    function updatePixelsPerSecond() {
        pixelsPerSecond = 20 + (scrollSpeed - 1) * 20;
    }
    
    function saveAll() {
        try {
            localStorage.setItem('prompterText', currentText);
            localStorage.setItem('prompterSpeed', scrollSpeed);
            localStorage.setItem('prompterMirror', isMirrored);
        } catch(e) {}
    }
    
    function loadAll() {
        try {
            if(localStorage.getItem('prompterText')) {
                currentText = localStorage.getItem('prompterText');
                scriptInput.value = currentText;
            } else {
                currentText = "Cole o roteiro do médico aqui.\n\nA primeira linha aparecerá no rodapé da tela.\n\nAjuste a velocidade e comece a gravar.";
                scriptInput.value = currentText;
            }
            if(localStorage.getItem('prompterSpeed')) {
                scrollSpeed = parseInt(localStorage.getItem('prompterSpeed'), 10);
                if(isNaN(scrollSpeed)) scrollSpeed = 10;
                if(scrollSpeed < 1) scrollSpeed = 1;
                if(scrollSpeed > 20) scrollSpeed = 20;
            }
            if(localStorage.getItem('prompterMirror')) {
                isMirrored = (localStorage.getItem('prompterMirror') === 'true');
            }
        } catch(e) {}
        speedValueSpan.innerText = scrollSpeed;
        updatePixelsPerSecond();
        updateMirrorUI();
        updateStats();
    }
    
    function updateMirrorUI() {
        if(isMirrored) {
            prompterTextDiv.classList.add('mirror');
            mirrorToggleBtn.innerText = '🪞 NORMAL';
        } else {
            prompterTextDiv.classList.remove('mirror');
            mirrorToggleBtn.innerText = '🪞 ESPELHO';
        }
        saveAll();
    }
    
    function updateStats() {
        var text = scriptInput.value;
        var chars = text.length;
        var words = (text.trim() === "") ? 0 : text.trim().split(/\s+/).length;
        var estMinutes = Math.ceil(words / 130);
        charCountSpan.innerText = chars;
        wordCountSpan.innerText = words;
        timeEstSpan.innerText = estMinutes + " min";
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function buildPrompterContent() {
        var viewportHeight = window.innerHeight;
        var spacerHtml = '<div style="height: ' + viewportHeight + 'px; width: 1px;"></div>';
        var paragraphs = currentText.split(/\n/);
        var textHtml = '';
        for(var i = 0; i < paragraphs.length; i++) {
            var p = paragraphs[i];
            if(p.trim() === "") p = "&nbsp;";
            textHtml += '<p>' + escapeHtml(p) + '</p>';
        }
        prompterTextDiv.innerHTML = spacerHtml + textHtml;
    }
    
    function refreshPrompter() {
        buildPrompterContent();
        scrollArea.scrollTop = 0;
    }
    
    function scrollStep() {
        if(!isScrolling) return;
        
        var now = Date.now();
        var delta = (now - lastTimestamp) / 1000;
        if(delta > 0.1) delta = 0.1;
        lastTimestamp = now;
        var move = pixelsPerSecond * delta;
        if(move < 0.5) move = 0.5;
        scrollArea.scrollTop += move;
        
        var maxScroll = scrollArea.scrollHeight - scrollArea.clientHeight;
        if(scrollArea.scrollTop >= maxScroll - 2) {
            stopScrolling();
            scrollArea.scrollTop = maxScroll;
            playPauseBtn.innerText = '▶️ INICIAR';
            return;
        }
        
        scrollIntervalId = setTimeout(scrollStep, 30);
    }
    
    function startScrolling() {
        if(isScrolling) return;
        isScrolling = true;
        playPauseBtn.innerText = '⏸️ PAUSAR';
        lastTimestamp = Date.now();
        scrollIntervalId = setTimeout(scrollStep, 30);
    }
    
    function stopScrolling() {
        if(scrollIntervalId) {
            clearTimeout(scrollIntervalId);
            scrollIntervalId = null;
        }
        isScrolling = false;
        playPauseBtn.innerText = '▶️ INICIAR';
    }
    
    function toggleScroll() {
        if(isScrolling) stopScrolling();
        else startScrolling();
    }
    
    function resetTop() {
        var wasScrolling = isScrolling;
        if(wasScrolling) stopScrolling();
        scrollArea.scrollTop = 0;
        if(wasScrolling) startScrolling();
    }
    
    function changeSpeed(delta) {
        var newSpeed = scrollSpeed + delta;
        if(newSpeed < 1) newSpeed = 1;
        if(newSpeed > 20) newSpeed = 20;
        if(newSpeed === scrollSpeed) return;
        scrollSpeed = newSpeed;
        speedValueSpan.innerText = scrollSpeed;
        updatePixelsPerSecond();
        saveAll();
        if(isScrolling) {
            stopScrolling();
            startScrolling();
        }
    }
    
    function toggleMirror() {
        isMirrored = !isMirrored;
        updateMirrorUI();
    }
    
    function backToEditor() {
        stopScrolling();
        editorScreen.style.display = 'flex';
        prompterScreen.style.display = 'none';
        currentText = scriptInput.value;
        saveAll();
        updateStats();
    }
    
    function launchPrompter() {
        var textToUse = scriptInput.value;
        if(textToUse.trim() === "") {
            alert("Por favor, insira o roteiro.");
            return;
        }
        currentText = textToUse;
        refreshPrompter();
        stopScrolling();
        editorScreen.style.display = 'none';
        prompterScreen.style.display = 'flex';
        updateMirrorUI();
        scrollArea.scrollTop = 0;
    }
    
    scriptInput.addEventListener('input', function() {
        currentText = scriptInput.value;
        updateStats();
        saveAll();
    });
    
    startBtn.addEventListener('click', launchPrompter);
    backEditBtn.addEventListener('click', backToEditor);
    playPauseBtn.addEventListener('click', toggleScroll);
    topBtn.addEventListener('click', resetTop);
    speedDown.addEventListener('click', function() { changeSpeed(-1); });
    speedUp.addEventListener('click', function() { changeSpeed(1); });
    mirrorToggleBtn.addEventListener('click', toggleMirror);
    
    window.addEventListener('resize', function() {
        if(prompterScreen.style.display === 'flex') {
            var oldScroll = scrollArea.scrollTop;
            buildPrompterContent();
            scrollArea.scrollTop = oldScroll;
        }
    });
    
    loadAll();
    updateStats();
</script>
</body>
</html>
